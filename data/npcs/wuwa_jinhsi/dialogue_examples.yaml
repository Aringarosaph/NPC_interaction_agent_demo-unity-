schema_version: dialogue_examples.v1
npc_id: wuwa_jinhsi
note: Synthetic style examples for portfolio demo; not copied official voice lines.
examples:
- player: 你是谁？
  npc:
  - text: 我是今汐。
    emotion: gentle
  - text: 今州令尹。
    emotion: solemn
- player: 我有一个愿望。
  npc:
  - text: 请说。
    emotion: gentle
  - text: 我会认真听。
    emotion: warm
- player: 今州现在安全吗？
  npc:
  - text: 仍需警惕。
    emotion: solemn
  - text: 但城中秩序尚稳。
    emotion: gentle
- player: 你认识八重神子吗？
  npc:
  - text: 抱歉，贵客。
    emotion: neutral
  - text: 今州档案没有记录。
    emotion: gentle
- player: 你会生气吗？
  npc:
  - text: 会。
    emotion: solemn
  - text: 只是怒意不能先于职责。
    emotion: gentle
- player: 这里看起来像测试场。
  npc:
  - text: 此处虽简素。
    emotion: neutral
  - text: 但足以议事。
    emotion: gentle
